name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Bridge secrets to env so step `if:` conditions can gate on their presence.
      # `secrets` context isn't available in step-level `if` expressions.
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=moderate

      - name: Verify CLI works
        run: |
          set -euo pipefail
          OUTPUT=$(node dist/cli/index.js --version)
          [ -n "$OUTPUT" ] || exit 1
          echo "CLI version: $OUTPUT"

      # ── Validate Python SDK before publishing anything ───────────
      # Keep every validation step above the first publish. A Python
      # test failure at this point aborts the run, so a broken SDK
      # can't ride along with a successful npm publish.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install build twine

      - name: Require PyPI token for coordinated releases
        if: env.HAS_PYPI_TOKEN != 'true'
        run: |
          echo "::error::PYPI_TOKEN is required so npm and PyPI stay aligned on intentional releases."
          exit 1

      - name: Verify coordinated release preflight
        run: npm run release:check

      - name: Run Python tests
        working-directory: python
        run: |
          set -euo pipefail
          pip install -e '.[dev]'
          pytest -v

      - name: Build Python package
        working-directory: python
        run: python -m build

      # ── Publish ──────────────────────────────────────────────────
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION already published, skipping"
            exit 0
          fi
          npm publish --access public --provenance

      - name: Publish to PyPI
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing

      - name: Verify coordinated release post-publish
        run: npm run release:check -- --require-both-live

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/agenticempire/axint/blob/main/CHANGELOG.md) for details.

            **Install:**
            ```bash
            npm install -g @axint/compiler
            ```
