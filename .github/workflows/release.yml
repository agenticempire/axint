name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=moderate || true
      - run: npm run build

      - name: Verify CLI works
        run: |
          OUTPUT=$(node dist/cli/index.js --version)
          [ -n "$OUTPUT" ] || exit 1
          echo "CLI version: $OUTPUT"

      # ── Publish to npm (primary registry) ────────────────────────
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Python SDK (publish to PyPI) ─────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install build twine

      - name: Run Python tests
        working-directory: python
        run: |
          pip install -e '.[dev]'
          pytest -v

      - name: Build Python package
        working-directory: python
        run: python -m build

      - name: Publish to PyPI
        if: env.TWINE_PASSWORD != ''
        working-directory: python
        run: twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      # ── GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/agenticempire/axint/blob/main/CHANGELOG.md) for details.

            **Install:**
            ```bash
            npm install -g @axintai/compiler
            ```
