name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Bridge secrets to env so step `if:` conditions can gate on their presence.
      # `secrets` context isn't available in step-level `if` expressions.
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=moderate

      - name: Verify CLI works
        run: |
          set -euo pipefail
          OUTPUT=$(node dist/cli/index.js --version)
          [ -n "$OUTPUT" ] || exit 1
          echo "CLI version: $OUTPUT"

      # ── Validate Python SDK before publishing anything ───────────
      # Keep every validation step above the first publish. A Python
      # test failure at this point aborts the run, so a broken SDK
      # can't ride along with a successful npm publish.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install build twine

      - name: Require PyPI token for coordinated releases
        if: env.HAS_PYPI_TOKEN != 'true'
        run: |
          echo "::error::PYPI_TOKEN is required so npm and PyPI stay aligned on intentional releases."
          exit 1

      - name: Verify coordinated release preflight
        run: |
          set -euo pipefail
          if npm run release:check; then
            exit 0
          fi

          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const pyproject = readFileSync("python/pyproject.toml", "utf8");
          const pyVersion = pyproject.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const npmUrl = `https://registry.npmjs.org/${encodeURIComponent(pkg.name)}/${pkg.version}`;
          const pypiUrl = `https://pypi.org/pypi/axint/${pyVersion}/json`;
          const [npmRes, pypiRes] = await Promise.all([fetch(npmUrl), fetch(pypiUrl)]);

          if (pkg.version === pyVersion && npmRes.ok && !pypiRes.ok) {
            console.log(`resuming coordinated release: ${pkg.name}@${pkg.version} is live; axint ${pyVersion} is still missing on PyPI`);
            process.exit(0);
          }

          console.error("release preflight failed and this is not a resumable npm-live/pypi-missing state");
          process.exit(1);
          NODE

      - name: Run Python tests
        working-directory: python
        run: |
          set -euo pipefail
          pip install -e '.[dev]'
          pytest -v

      - name: Build Python package
        working-directory: python
        run: python -m build

      # ── Publish ──────────────────────────────────────────────────
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION already published, skipping"
            exit 0
          fi
          npm publish --access public --provenance

      - name: Publish to PyPI
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing

      - name: Verify coordinated release post-publish
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if npm run release:check -- --require-both-live; then
              exit 0
            fi
            echo "release parity is not visible yet; retrying after registry propagation ($attempt/5)"
            sleep 30
          done
          npm run release:check -- --require-both-live

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/agenticempire/axint/blob/main/CHANGELOG.md) for details.

            **Install:**
            ```bash
            npm install -g @axint/compiler
            ```
