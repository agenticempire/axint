name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── TypeScript Compiler ──────────────────────────────────────────
  test-typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci
      - run: npm audit --audit-level=moderate || true
      - run: npm run versions:check
      - run: npm run metrics:check
      - run: npm run typecheck
      - run: npm run typecheck:examples
      - run: npm run lint
      - run: npm run build
      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload TypeScript coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: typescript
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Run benchmarks
        run: npm run bench -- --reporter=verbose
        continue-on-error: true

      - name: Verify CLI works
        run: |
          set -euo pipefail
          OUTPUT=$(node dist/cli/index.js --version)
          [ -n "$OUTPUT" ] || exit 1
          echo "CLI version: $OUTPUT"

      - name: Publish Axint Cloud CI report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AXINT_CLOUD_REPORT_TOKEN: ${{ secrets.AXINT_CLOUD_REPORT_TOKEN }}
          AXINT_CLOUD_REPORT_URL: https://registry.axint.ai/api/v1/cloud/reports/ci
        run: |
          set -euo pipefail
          if [ -z "${AXINT_CLOUD_REPORT_TOKEN:-}" ]; then
            echo "AXINT_CLOUD_REPORT_TOKEN not set — skipping"
            exit 0
          fi
          npx tsx scripts/publish-cloud-report.ts

  # ── Swift Sandbox (macOS) ─────────────────────────────────────────
  test-swift-sandbox:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Run sandbox tests (requires Xcode + AppIntents SDK)
        run: npx vitest run tests/core/sandbox.test.ts --reporter=verbose

  # ── Python SDK ───────────────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy axint

      - name: Type check with pyright
        run: pyright

      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=axint --cov-report=json --cov-report=lcov --cov-report=term

      - name: Upload Python coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./python/coverage.json
          flags: python
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Verify CLI works
        run: |
          set -euo pipefail
          axint-py --version
          axint-py parse examples/create_event.py --json

      - name: Check docs.axint.ai/python/install freshness
        if: matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: python scripts/check-docs-freshness.py
