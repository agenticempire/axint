name: Publish MCP Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - server.json
      - .github/workflows/publish-mcp-registry.yml

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Wait for package visibility
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function main() {
            const server = JSON.parse(fs.readFileSync("server.json", "utf8"));
            const packages = server.packages || [];

            const registryPackages = packages
              .filter((pkg) => pkg.registryType === "npm" || pkg.registryType === "pypi")
              .map((pkg) => ({
                name: pkg.identifier,
                version: pkg.version,
                registryType: pkg.registryType,
              }));

            if (registryPackages.length === 0) {
              console.log("server.json does not declare npm or PyPI packages; skipping visibility wait.");
              return;
            }

            for (const pkg of registryPackages) {
              const url =
                pkg.registryType === "npm"
                  ? `https://registry.npmjs.org/${encodeURIComponent(pkg.name).replace(/^%40/, "@")}/${pkg.version}`
                  : `https://pypi.org/pypi/${encodeURIComponent(pkg.name)}/${pkg.version}/json`;
              let ok = false;

              for (let attempt = 1; attempt <= 18; attempt += 1) {
                const res = await fetch(url);
                if (res.ok) {
                  console.log(`${pkg.name}@${pkg.version} is visible on ${pkg.registryType}.`);
                  ok = true;
                  break;
                }

                console.log(
                  `${pkg.name}@${pkg.version} not visible on ${pkg.registryType} yet (${res.status}); retry ${attempt}/18.`
                );
                await sleep(10_000);
              }

              if (!ok) {
                console.error(
                  `${pkg.name}@${pkg.version} was not visible on ${pkg.registryType} before MCP publish.`
                );
                process.exit(1);
              }
            }
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: |
          set -euo pipefail
          if output=$(./mcp-publisher publish 2>&1); then
            echo "$output"
            exit 0
          fi

          echo "$output"
          if grep -qi "duplicate version" <<<"$output"; then
            echo "::notice::This server.json version is already published in the official MCP Registry."
            exit 0
          fi

          exit 1
